name: Fix UI animation compilation

on:
  push:
    branches:
      - agent/optimize-ui-animations

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply and commit fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/ui/setup_page.rs")
          text = path.read_text()
          replacements = {
              "let mut last_render = None;": "let mut last_render: Option<Instant> = None;",
              "mod_download_start_text, subtitle_language_labels, voice_language_labels,": "mod_download_start_text, subtitle_language_labels, voice_language_labels, ProgressMsg,\n        ProgressState,",
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise RuntimeError(f"unexpected match count for {old!r}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          cargo fmt
          rm clippy-error.txt .github/workflows/fix-ui-animation-clippy.yml
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "Fix UI animation compilation"
          git push
