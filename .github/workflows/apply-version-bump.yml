name: Apply version bump

on:
  push:
    branches: [agent/improve-flatpak-packaging]

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Bump version
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"expected exactly one match in {path}: {old!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "Cargo.toml",
              'version = "0.3.9"',
              'version = "0.3.10"',
          )
          replace_once(
              "Cargo.lock",
              'name = "adventure-mods"\nversion = "0.3.9"',
              'name = "adventure-mods"\nversion = "0.3.10"',
          )

          metainfo = Path("data/io.github.astrovm.AdventureMods.metainfo.xml.in")
          text = metainfo.read_text(encoding="utf-8")
          marker = "  <releases>\n"
          release = """    <release version="0.3.10" date="2026-07-23">
              <description>
                <p>Improved Linux packaging and Flatpak distribution.</p>
                <ul>
                  <li>Added production Flatpak builds for x86_64 and ARM64</li>
                  <li>Prepared publication through the official astrovm Flatpak repository</li>
                  <li>Updated Flatpak and AppImage dependencies, validation, and host integration</li>
                </ul>
              </description>
            </release>
          """
          if 'release version="0.3.10"' in text:
              raise SystemExit("0.3.10 release entry already exists")
          if text.count(marker) != 1:
              raise SystemExit("expected exactly one releases element")
          metainfo.write_text(text.replace(marker, marker + release, 1), encoding="utf-8")

          Path(".github/workflows/apply-version-bump.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock data/io.github.astrovm.AdventureMods.metainfo.xml.in \
            .github/workflows/apply-version-bump.yml
          git commit -m "Bump version to 0.3.10"
          git push
