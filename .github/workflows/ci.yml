name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# One run per PR or branch; cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-26.04
          - ubuntu-26.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            curl \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            xvfb

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: xvfb-run cargo test

  flatpak:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-26.04
          - arch: aarch64
            runner: ubuntu-26.04-arm
    runs-on: ${{ matrix.variant.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate manifest inputs
        run: |
          build-aux/check-cargo-sources.py
          flatpak-builder --show-manifest build-aux/io.github.astrovm.AdventureMods.json >/dev/null

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          manifest-path: build-aux/io.github.astrovm.AdventureMods.json
          arch: ${{ matrix.variant.arch }}
          build-dir: flatpak-production
          build-bundle: ${{ startsWith(github.ref, 'refs/tags/') }}
          # Arch-specific filename so multi-arch release downloads do not collide.
          bundle: AdventureMods-${{ matrix.variant.arch }}.flatpak
          repository-url: https://dl.flathub.org/repo/flathub.flatpakrepo
          upload-artifact: ${{ startsWith(github.ref, 'refs/tags/') }}
          run-tests: false
          cache-key: flatpak-production-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'build-aux/**') }}

      - name: Verify packaged application
        run: >-
          build-aux/test-flatpak-package.sh
          flatpak-production
          io.github.astrovm.AdventureMods

  appimage:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-26.04
          - arch: aarch64
            runner: ubuntu-26.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install dependencies
        run: |
          apt update
          apt install -y \
            build-essential pkg-config meson gettext python3-pip python3-setuptools \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev \
            libgraphene-1.0-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf-2.0-dev libepoxy-dev libwayland-dev \
            libxkbcommon-dev libvulkan-dev libx11-dev libxrandr-dev \
            libxi-dev libxext-dev libxcursor-dev libxdamage-dev \
            libxfixes-dev libxinerama-dev libxcomposite-dev \
            wayland-protocols libcloudproviders-dev libsass-dev sassc \
            libappstream-dev desktop-file-utils appstream libxml2-utils \
            wget unzip file libfuse2 curl git glslc libdrm-dev sudo gh zsync \
            librsvg2-dev libgirepository1.0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build AppImage
        run: bash build-aux/appimage/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: AdventureMods-AppImage-${{ matrix.arch }}
          path: appimage-build/*.AppImage*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [appimage, flatpak]
    runs-on: ubuntu-26.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download AppImage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: AdventureMods-AppImage-*
          path: appimage-artifacts
          merge-multiple: true

      - name: Download Flatpak artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: AdventureMods-*.flatpak
          path: flatpak-artifacts
          merge-multiple: true

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          notes=$(python3 build-aux/extract-release-notes.py "$version")
          gh release create "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --notes "$notes" \
            --draft || true
          gh release upload "${{ github.ref_name }}" \
            appimage-artifacts/*.AppImage* \
            flatpak-artifacts/*.flatpak \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
