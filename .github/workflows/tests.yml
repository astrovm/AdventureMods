name: Rust Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: cargo test
