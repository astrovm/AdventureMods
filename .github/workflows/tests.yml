name: Rust Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            curl \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            xvfb

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: xvfb-run cargo test
