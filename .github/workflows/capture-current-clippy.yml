name: Capture current clippy diagnostic

on:
  push:
    branches:
      - agent/optimize-ui-animations

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            curl \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            xvfb

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Capture diagnostic
        run: |
          cargo clippy --all-targets -- -D warnings > current-clippy-error.txt 2>&1 || true
          rm .github/workflows/capture-current-clippy.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "Capture current clippy diagnostic"
          git push
