name: AppImage

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-26.04
          - arch: aarch64
            runner: ubuntu-26.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential pkg-config meson gettext python3-pip python3-setuptools \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev \
            libgraphene-1.0-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf-2.0-dev libepoxy-dev libwayland-dev \
            libxkbcommon-dev libvulkan-dev libx11-dev libxrandr-dev \
            libxi-dev libxext-dev libxcursor-dev libxdamage-dev \
            libxfixes-dev libxinerama-dev libxcomposite-dev \
            wayland-protocols libcloudproviders-dev libsass-dev sassc \
            libappstream-dev desktop-file-utils appstream \
            wget unzip file libfuse2 curl git glslc libdrm-dev sudo gh zsync \
            librsvg2-dev libgirepository1.0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build AppImage
        run: bash build-aux/appimage/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdventureMods-AppImage-${{ matrix.arch }}
          path: appimage-build/*.AppImage*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@v4

      - name: Download AppImage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: AdventureMods-AppImage-*
          path: appimage-artifacts
          merge-multiple: true

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          notes=$(python3 build-aux/extract-release-notes.py "$version")
          gh release create "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --notes "$notes" \
            --draft || true
          gh release upload "${{ github.ref_name }}" appimage-artifacts/*.AppImage* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
