name: AppImage

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make pkg-config meson cargo \
            gtk4-devel libadwaita-devel glib2-devel \
            desktop-file-utils appstream \
            wget unzip file

      - name: Build AppImage
        run: bash build-aux/appimage/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdventureMods-AppImage-x86_64
          path: appimage-build/*.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dnf install -y gh
          gh release upload "${{ github.ref_name }}" appimage-build/*.AppImage --clobber
