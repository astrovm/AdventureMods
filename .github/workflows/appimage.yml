name: AppImage

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config meson rustc cargo \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev \
            desktop-file-utils appstream gettext \
            wget unzip file libfuse2

      - name: Build AppImage
        run: bash build-aux/appimage/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdventureMods-AppImage-x86_64
          path: appimage-build/*.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" appimage-build/*.AppImage --clobber
