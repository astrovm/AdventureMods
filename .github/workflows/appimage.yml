name: AppImage

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:13

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential pkg-config meson gettext python3-pip python3-setuptools \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev \
            libgraphene-1.0-dev libpango1.0-dev libcairo2-dev \
            libgdk-pixbuf-2.0-dev libepoxy-dev libwayland-dev \
            libxkbcommon-dev libvulkan-dev libx11-dev libxrandr-dev \
            libxi-dev libxext-dev libxcursor-dev libxdamage-dev \
            libxfixes-dev libxinerama-dev libxcomposite-dev \
            wayland-protocols libcloudproviders-dev libsass-dev sassc \
            libappstream-dev desktop-file-utils appstream \
            wget unzip file libfuse2 curl git glslc libdrm-dev sudo gh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build AppImage
        run: bash build-aux/appimage/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdventureMods-AppImage-x86_64
          path: appimage-build/*.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --generate-notes || true
          gh release upload "${{ github.ref_name }}" appimage-build/*.AppImage \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
