name: AppImage

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config meson gettext \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev \
            desktop-file-utils appstream \
            wget unzip file libfuse2

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --quiet
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build AppImage
        run: bash build-aux/appimage/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdventureMods-AppImage-x86_64
          path: appimage-build/*.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes || true
          gh release upload "${{ github.ref_name }}" appimage-build/*.AppImage --clobber
