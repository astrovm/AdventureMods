name: Clean UI animation optimizations

on:
  push:
    branches:
      - agent/optimize-ui-animations

permissions:
  contents: write

jobs:
  clean:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Clean and commit changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/ui/setup_page.rs")
          text = path.read_text()
          replacements = {
              "let elapsed = Instant::now().duration_since(last_render);": "let elapsed = last_render.elapsed();",
              "let checks: std::rc::Rc<std::cell::RefCell<Vec<gtk::CheckButton>>> =\n            std::rc::Rc::new(std::cell::RefCell::new(Vec::new()));": "let checks: Rc<RefCell<Vec<gtk::CheckButton>>> =\n            Rc::new(RefCell::new(Vec::new()));",
              "source_slot.borrow_mut().replace(source_id);": "let _ = source_slot.borrow_mut().replace(source_id);",
              "std::time::Duration::from_millis(50),": "Duration::from_millis(50),",
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise RuntimeError(f"unexpected match count for {old!r}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          cargo fmt
          rm .github/workflows/clean-ui-animation-optimizations.yml
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "Polish UI animation optimizations"
          git push
